# Scraper Profiles
# Each profile defines scraping parameters optimized for a category of websites.
# Add new domains to the routing section — one line per domain.

profiles:
  default:
    wait_until: domcontentloaded
    selector_timeout: 5000
    content_selectors: ["main", "article", "[class*='content']", "h1"]
    skip_table_classes: []
    nav_patterns: ["navigation", "sidebar", "menu", "toc"]
    noise_url_patterns: []
    noise_text_patterns: []
    markdown_cleanup: []

  wiki:
    wait_until: domcontentloaded
    selector_timeout: 5000
    content_selectors: ["main", "article"]
    skip_table_classes: ["infobox", "wikitable", "navbox", "sidebar", "metadata", "mbox", "ambox", "tmbox"]
    nav_patterns:
      - "vector-"
      - "mw-portlet"
      - "mw-panel"
      - "navigation"
      - "noprint"
      - "toc"
      - "sidebar"
      - "menu"
      - "tools"
      - "p-lang"
      - "p-tb"
      - "p-navigation"
      - "p-interaction"
      - "wmde-banner"
      - "cn-fundraising"
      - "frb"
      - "catlinks"
    noise_url_patterns: ["#cite_ref", "#cite_note"]
    noise_text_patterns: []
    markdown_cleanup: ["wiki_citations", "wiki_links", "german_url_decode"]

  sphinx:
    wait_until: domcontentloaded
    selector_timeout: 5000
    content_selectors: ["main", "article", "[role='main']"]
    skip_table_classes: []
    nav_patterns: ["navigation", "sidebar", "toc", "sphx-glr", "gallery"]
    noise_url_patterns: []
    noise_text_patterns: []
    markdown_cleanup: ["sphinx_source"]

  blog:
    wait_until: domcontentloaded
    selector_timeout: 5000
    content_selectors: ["article", "main", "[class*='content']"]
    skip_table_classes: []
    nav_patterns: ["navigation", "sidebar", "menu"]
    noise_url_patterns:
      - "/m/signin"
      - "actionUrl="
      - "operation=register"
      - "clap_footer"
      - "bookmark_footer"
      - "/@"
    noise_text_patterns:
      - "member-only story"
      - "share"
      - "listen"
      - "press enter or click to view"
      - "min read"
    markdown_cleanup: []

  js_rendered:
    wait_until: networkidle
    selector_timeout: 10000
    content_selectors: ["main", "article", "[class*='content']", "h1"]
    skip_table_classes: []
    nav_patterns: ["navigation", "sidebar", "menu", "toc"]
    noise_url_patterns: []
    noise_text_patterns: []
    markdown_cleanup: []

routing:
  "*.wikipedia.org": wiki
  "docs.searxng.org": sphinx
  "scikit-learn.org": sphinx
  "*.readthedocs.io": sphinx
  "medium.com": blog
  "docs.trychroma.com": js_rendered
  "developers.binance.com": js_rendered
