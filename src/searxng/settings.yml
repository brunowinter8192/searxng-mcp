use_default_settings: true

server:
  secret_key: "searxng_mcp_local_instance"
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  suspended_times:
    SearxEngineAccessDenied: 600
    SearxEngineCaptcha: 600
    SearxEngineTooManyRequests: 300
    cf_SearxEngineCaptcha: 1800
    cf_SearxEngineAccessDenied: 600
    recaptcha_SearxEngineCaptcha: 3600

ui:
  static_use_hash: true
  default_theme: simple
  query_in_title: true
  infinite_scroll: false
  results_on_new_tab: false

outgoing:
  request_timeout: 5.0
  max_request_timeout: 15.0
  proxies:
    all://:
      - socks5h://tor:9150
  using_tor_proxy: true
  extra_proxy_timeout: 10

engines:
  - name: google
    engine: google
    disabled: false
    using_tor_proxy: false
    proxies: {}
    weight: 2
  - name: duckduckgo
    engine: duckduckgo
    disabled: false
    using_tor_proxy: false
    proxies: {}
    weight: 1
  - name: brave
    engine: brave
    weight: 2
  - name: startpage
    engine: startpage
    weight: 2
  - name: qwant
    engine: qwant
    disabled: true
  - name: google scholar
    engine: google_scholar
    disabled: false
    weight: 2
    timeout: 10

hostnames:
  high_priority:
    - '(.*\.)?github\.com$'
    - '(.*\.)?stackoverflow\.com$'
    - '(.*\.)?stackexchange\.com$'
    - '(.*\.)?wikipedia\.org$'
    - '(.*\.)?docs\.python\.org$'
    - '(.*\.)?developer\.mozilla\.org$'
    - '(.*\.)?arxiv\.org$'
    - '(.*\.)?huggingface\.co$'
    - '(.*\.)?pytorch\.org$'
    - '(.*\.)?readthedocs\.io$'
    - '(.*\.)?anthropic\.com$'
    - '(.*\.)?openai\.com$'
  low_priority:
    - '(.*\.)?pinterest\.'
    - '(.*\.)?quora\.com$'
    - '(.*\.)?w3schools\.com$'
    - '(.*\.)?hub\.docker\.com$'
    - '(.*\.)?linkedin\.com$'
    - '(.*\.)?amazon\.'
  remove:
    - '(.*\.)?pinterest\.'
