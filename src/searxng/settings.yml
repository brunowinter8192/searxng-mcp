use_default_settings: true

server:
  secret_key: "searxng_mcp_local_instance"
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  suspended_times:
    SearxEngineAccessDenied: 600
    SearxEngineCaptcha: 600
    SearxEngineTooManyRequests: 300
    cf_SearxEngineCaptcha: 1800
    cf_SearxEngineAccessDenied: 600
    recaptcha_SearxEngineCaptcha: 3600

ui:
  static_use_hash: true
  default_theme: simple
  query_in_title: true
  infinite_scroll: false
  results_on_new_tab: false

outgoing:
  request_timeout: 5.0
  max_request_timeout: 15.0
  proxies:
    all://:
      - socks5h://tor:9150
  using_tor_proxy: true
  extra_proxy_timeout: 10

engines:
  # ===== general: scrapeable engines (Web + Science) =====
  - name: google
    engine: google
    categories: general
    disabled: false
    using_tor_proxy: false
    proxies: {}
    weight: 2
  - name: bing
    engine: bing
    categories: general
    disabled: false
    using_tor_proxy: false
    proxies: {}
    weight: 1
  - name: mojeek
    engine: mojeek
    categories: general
    disabled: false
    using_tor_proxy: false
    proxies: {}
    weight: 1
    timeout: 10
  - name: brave
    engine: brave
    categories: general
    weight: 2
  - name: startpage
    engine: startpage
    categories: general
    weight: 1
  - name: duckduckgo
    engine: duckduckgo
    categories: general
    disabled: true
    using_tor_proxy: false
    proxies: {}
    weight: 1
  - name: google scholar
    engine: google_scholar
    categories: general
    disabled: false
    weight: 2
    timeout: 10
  - name: semantic scholar
    engine: semantic_scholar
    categories: general
    disabled: false
    weight: 2
  - name: crossref
    engine: crossref
    categories: general
    disabled: false
    weight: 1
  # ===== plugin: discovery-only (content via MCP plugins) =====
  - name: arxiv
    engine: arxiv
    categories: plugin
    disabled: false
    weight: 2
  - name: github
    engine: github
    categories: plugin
    disabled: false
    weight: 1
  - name: reddit
    engine: reddit
    categories: plugin
    disabled: false
    page_size: 25
    weight: 1
  # ===== disabled =====
  - name: qwant
    engine: qwant
    disabled: true

hostnames:
  high_priority:
    # Code & Q&A
    - '(.*\.)?github\.com$'
    - '(.*\.)?stackoverflow\.com$'
    - '(.*\.)?stackexchange\.com$'
    # Documentation
    - '(.*\.)?docs\.python\.org$'
    - '(.*\.)?developer\.mozilla\.org$'
    - '(.*\.)?readthedocs\.io$'
    - '(.*\.)?pytorch\.org$'
    - '(.*\.)?docs\.rs$'
    - '(.*\.)?pkg\.go\.dev$'
    - '(.*\.)?learn\.microsoft\.com$'
    # ML/AI
    - '(.*\.)?arxiv\.org$'
    - '(.*\.)?huggingface\.co$'
    - '(.*\.)?anthropic\.com$'
    - '(.*\.)?openai\.com$'
    - '(.*\.)?semanticscholar\.org$'
    # Reference
    - '(.*\.)?wikipedia\.org$'
  low_priority:
    - '(.*\.)?pinterest\.'
    - '(.*\.)?quora\.com$'
    - '(.*\.)?w3schools\.com$'
    - '(.*\.)?hub\.docker\.com$'
    - '(.*\.)?linkedin\.com$'
    - '(.*\.)?amazon\.'
  remove:
    - '(.*\.)?pinterest\.'
