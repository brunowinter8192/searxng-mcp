use_default_settings: true

server:
  secret_key: "searxng_mcp_local_instance"
  limiter: false
  image_proxy: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

ui:
  static_use_hash: true
  default_theme: simple
  query_in_title: true
  infinite_scroll: false
  results_on_new_tab: false

outgoing:
  request_timeout: 3.0
  max_request_timeout: 10.0
